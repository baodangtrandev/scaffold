name: CI/CD Pipeline to AWS EC2 (Subfolder CICD)

# Chỉ chạy Pipeline này khi có code thay đổi trong thư mục CICD
on:
  push:
    branches: [ "main" ]
    paths:
      - 'CICD/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Rất quan trọng: Báo cho GitHub biết phải "cd" vào thư mục CICD trước khi chạy lệnh
    defaults:
      run:
        working-directory: ./CICD
        
    steps:
      - name: Lấy code từ GitHub
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt thư viện
        run: make install

      - name: Chạy Linting
        run: make lint

      - name: Chạy Test tự động
        run: make test

  deploy-to-ec2:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Đăng nhập EC2 và gọi lệnh Make Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Bước 1: Mở thư mục gốc của repository trên EC2 và cập nhật code
            cd /home/ubuntu/scaffold
            git pull origin main
            
            # Bước 2: Chui vào thư mục ứng dụng con và gọi lệnh deploy
            cd CICD
            make deploy
